<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="Geographic distribution of Monad validators with region balance indicators.">
<meta name="author" content="shadowoftime">
<meta property="og:type" content="website">
<meta property="og:title" content="Network Map — MonadPulse">
<meta property="og:description" content="Geographic distribution of Monad validators with region balance indicators.">
<meta property="og:image" content="https://monadpulse.xyz/favicon.svg">
<meta property="og:url" content="https://monadpulse.xyz/map.html">
<meta property="og:site_name" content="MonadPulse">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Network Map — MonadPulse">
<meta name="twitter:description" content="Geographic distribution of Monad validators with region balance indicators.">
<meta name="twitter:image" content="https://monadpulse.xyz/favicon.svg">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  #map-container { height: 520px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(110,84,255,0.1); }
  .leaflet-container { background: #0a0814; }
  .val-popup { font-family: 'Roboto Mono', monospace; font-size: 12px; line-height: 1.6; }
  .leaflet-popup-content-wrapper {
    background: rgba(14,9,28,0.95) !important;
    border: 1px solid rgba(110,84,255,0.25) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(110,84,255,0.1) !important;
    color: #EEEDF5 !important;
  }
  .leaflet-popup-tip { background: rgba(14,9,28,0.95) !important; border: 1px solid rgba(110,84,255,0.25) !important; }
  .leaflet-popup-close-button { color: #6B6580 !important; font-size: 18px !important; }
  .leaflet-popup-close-button:hover { color: #DDD7FE !important; }
  .map-show-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 99px;
    background: rgba(110,84,255,0.1);
    color: #DDD7FE;
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
  }
  .map-show-btn:hover {
    background: rgba(110,84,255,0.2);
    box-shadow: 0 0 16px rgba(110,84,255,0.2);
  }
  .map-legend {
    background: rgba(14,9,28,0.9);
    border: 1px solid rgba(110,84,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    backdrop-filter: blur(10px);
  }
</style>
</head>
<body>
<div class="bg-canvas"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<header>
  <div class="header-inner">
    <a href="/" class="logo">MonadPulse</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/blocks.html">Blocks</a>
      <a href="/validators.html">Validators</a>
      <a href="/map.html" class="active">Map</a>
      <a href="/stake.html">Stake</a>
      <a href="/gas.html">Gas</a>
      <a href="/alerts.html">Alerts</a>
    </nav>
    <div class="net-switch">
      <button class="net-btn active" data-net="testnet">Testnet</button>
      <button class="net-btn" data-net="mainnet">Mainnet</button>
    </div>
  </div>
</header>
<main>
  <div style="padding-top:48px">
    <h1 class="page-title">Network Map</h1>
    <p class="page-desc">Geographic distribution of Monad validators</p>
  </div>

  <div id="map-container"></div>

  <div class="flow-sep"></div>

  <section class="data-section">
    <div class="section-title">Known Validator Locations</div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="map-search" placeholder="Search by name, city, or region...">
    </div>
    <div style="overflow-x:auto">
      <table id="map-validators-table">
        <thead>
          <tr><th>Validator</th><th>City</th><th>Region</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="map-show-more-wrap" style="display:none;margin-top:16px">
      <button class="map-show-btn" onclick="window._toggleMapTable()">Show all</button>
    </div>
  </section>
</main>
<footer>
  <div class="footer-inner-new">
    <div class="footer-links"><a href="/about.html">About</a> · <a href="https://t.me/monadpulse_alerts" target="_blank">Telegram</a> · <a href="https://github.com/ShadowOfTime1/monadpulse" target="_blank">GitHub</a> · <a href="https://x.com/RomanKarpenk" target="_blank">X</a> · <a href="https://shadowoftime1.github.io" target="_blank">Validator</a></div>
    <div class="footer-copy">built by shadowoftime — independent Monad validator, Sydney AU</div>
  </div>
</footer>
<script src="/js/app.js"></script>
<script src="/js/map.js"></script>
</body>
</html>

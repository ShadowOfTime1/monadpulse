<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validator — MonadPulse</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="Validator detail page with health score breakdown, blocks, and activity.">
<meta name="author" content="shadowoftime">
<meta property="og:type" content="website">
<meta property="og:title" content="Validator — MonadPulse">
<meta property="og:description" content="Validator detail page with health score breakdown, blocks, and activity.">
<meta property="og:image" content="https://monadpulse.xyz/favicon.svg">
<meta property="og:url" content="https://monadpulse.xyz/validator.html">
<meta property="og:site_name" content="MonadPulse">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Validator — MonadPulse">
<meta name="twitter:description" content="Validator detail page with health score breakdown, blocks, and activity.">
<meta name="twitter:image" content="https://monadpulse.xyz/favicon.svg">
<link rel="stylesheet" href="/css/style.css">
<style>
  .val-hero {
    padding: 32px 0 24px;
    border-bottom: 1px solid rgba(110,84,255,0.1);
    margin-bottom: 24px;
  }
  .val-hero-top { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .val-back {
    color: var(--text-dim); font-size: 12px; text-decoration: none;
    font-family: var(--mono); letter-spacing: 0.5px; transition: color 0.2s;
  }
  .val-back:hover { color: #DDD7FE; }
  .val-name-big {
    font-family: var(--mono); font-size: 34px; font-weight: 700;
    color: #EEEDF5; letter-spacing: -0.5px; line-height: 1.1;
    word-break: break-all;
  }
  .val-addr-sub {
    font-family: var(--mono); font-size: 12px; color: #6B6580;
    margin-top: 8px; letter-spacing: 0.3px; word-break: break-all;
  }
  .val-hero-row {
    display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-end;
    margin-top: 24px;
  }
  .val-hero-score { display: flex; flex-direction: column; gap: 4px; }
  .val-hero-score .num {
    font-family: var(--mono); font-size: 54px; font-weight: 700;
    line-height: 1; letter-spacing: -1px;
  }
  .val-hero-score .lbl {
    color: var(--text-dim); font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; font-family: var(--mono);
  }
  .val-quick { display: flex; gap: 32px; flex-wrap: wrap; }
  .val-quick .q {
    font-family: var(--mono);
  }
  .val-quick .q .v {
    color: #EEEDF5; font-size: 22px; font-weight: 600; display: block;
  }
  .val-quick .q .k {
    color: var(--text-dim); font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; margin-top: 4px;
  }

  .breakdown-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-top: 8px;
  }
  .breakdown-item {
    padding: 14px 16px;
    background: rgba(110,84,255,0.04);
    border: 1px solid rgba(110,84,255,0.1);
    border-radius: 10px;
  }
  .breakdown-item .bi-name {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .breakdown-item .bi-bar {
    height: 4px; background: rgba(110,84,255,0.1); border-radius: 2px;
    margin-bottom: 8px; overflow: hidden;
  }
  .breakdown-item .bi-bar-fill {
    height: 100%; border-radius: 2px;
  }
  .breakdown-item .bi-val {
    font-family: var(--mono); font-size: 16px; font-weight: 600;
  }
  .breakdown-item .bi-weight {
    color: var(--text-dim); font-size: 10px; margin-left: 6px;
  }

  #val-loading { text-align: center; padding: 80px 0; color: var(--text-dim); font-family: var(--mono); font-size: 13px; }
  #val-empty { text-align: center; padding: 80px 20px; color: var(--text-dim); font-family: var(--mono); font-size: 13px; }
  #val-empty .empty-code { color: #DDD7FE; word-break: break-all; display: block; margin-top: 8px; }
</style>
</head>
<body>
<div class="bg-canvas"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<header>
  <div class="header-inner">
    <a href="/" class="logo">MonadPulse</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/blocks.html">Blocks</a>
      <a href="/validators.html" class="active">Validators</a>
      <a href="/map.html">Map</a>
      <a href="/stake.html">Stake</a>
      <a href="/gas.html">Gas</a>
      <a href="/alerts.html">Alerts</a>
    </nav>
    <div class="net-switch">
      <button class="net-btn active" data-net="testnet">Testnet</button>
      <button class="net-btn" data-net="mainnet">Mainnet</button>
    </div>
  </div>
</header>
<main>
  <div id="val-loading">Loading validator...</div>
  <div id="val-content" style="display:none"></div>
  <div id="val-empty" style="display:none">
    <div>No blocks produced by this validator on this network.</div>
    <span class="empty-code" id="val-empty-addr"></span>
  </div>
</main>
<footer>
  <div class="footer-inner-new">
    <div class="footer-links"><a href="/about.html">About</a> · <a href="https://t.me/monadpulse_alerts" target="_blank">Telegram</a> · <a href="https://github.com/ShadowOfTime1/monadpulse" target="_blank">GitHub</a> · <a href="https://x.com/RomanKarpenk" target="_blank">X</a> · <a href="https://shadowoftime1.github.io" target="_blank">Validator</a></div>
    <div class="footer-copy">built by shadowoftime — independent Monad validator, Sydney AU</div>
  </div>
</footer>
<script src="/js/app.js"></script>
<script>
async function loadValidator() {
  const params = new URLSearchParams(location.search);
  const addr = (params.get('addr') || '').toLowerCase();
  const loading = document.getElementById('val-loading');
  const content = document.getElementById('val-content');
  const empty = document.getElementById('val-empty');

  if (!addr || !/^0x[0-9a-f]{40}$/i.test(addr)) {
    loading.innerHTML = `
      <div style="max-width:420px;margin:0 auto;padding:40px 20px;text-align:center">
        <div style="font-size:15px;color:#DDD7FE;margin-bottom:8px">No validator selected</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:24px;line-height:1.6">
          This page expects a validator address in the URL<br>
          (e.g. <code style="color:#a78bfa">?addr=0x…</code>)
        </div>
        <a href="/validators.html" class="page-btn" style="display:inline-block;padding:10px 24px;text-decoration:none;min-width:180px">← Go to Validators</a>
      </div>`;
    return;
  }

  if (addr === '0x0000000000000000000000000000000000000000') {
    loading.innerHTML = `
      <div style="max-width:520px;margin:0 auto;padding:40px 20px;text-align:center">
        <div style="font-size:15px;color:#FFAE45;margin-bottom:8px">⚠ Null proposer address</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:24px;line-height:1.7">
          Blocks attributed to <code style="color:#FFAE45">0x0000…0000</code> represent<br>
          proposer-recovery failures, not a real validator.<br>
          These rows are excluded from aggregates and rankings.
        </div>
        <a href="/validators.html" class="page-btn" style="display:inline-block;padding:10px 24px;text-decoration:none;min-width:180px">← Go to Validators</a>
      </div>`;
    return;
  }

  await loadNames();

  const [detail, healthList, allValidators] = await Promise.all([
    apiFetch('/validators/' + addr),
    apiFetch('/health/scores?limit=500'),
    apiFetch('/validators/list?period=24h'),
  ]);

  if (!detail || !detail.stats) {
    loading.style.display = 'none';
    document.getElementById('val-empty-addr').textContent = addr;
    empty.style.display = 'block';
    return;
  }

  const health = (healthList || []).find(h => h.validator_id === addr) || null;
  const rank = (allValidators || []).findIndex(v => v.address === addr) + 1;
  const totalVals = (allValidators || []).length;

  const name = (typeof valName === 'function' && valName(addr)) || null;
  const displayName = name || shortAddr(addr);
  const totalScore = health ? health.total_score : null;
  const scoreCol = totalScore == null ? 'var(--text-dim)'
    : totalScore >= 80 ? '#4ade80'
    : totalScore >= 50 ? '#FFAE45'
    : '#FF8EE4';

  const avgBt = detail.stats.avg_block_time_ms;
  const avgBtStr = avgBt == null ? '—' : avgBt + ' ms';
  const avgBtCol = avgBt == null ? 'inherit'
    : (avgBt > 450 || (avgBt < 300 && avgBt > 0)) ? '#FF8EE4' : 'inherit';

  const lastSeen = detail.stats.last_seen
    ? (typeof timeAgo === 'function' ? timeAgo(detail.stats.last_seen) : new Date(detail.stats.last_seen).toLocaleString())
    : '—';

  const breakdownComponents = health ? [
    { name: 'Uptime',     val: health.uptime_score,  weight: '40%' },
    { name: 'Block Time', val: health.miss_score,    weight: '20%' },
    { name: 'Upgrade',    val: health.upgrade_score, weight: '15%' },
    { name: 'Stake',      val: health.stake_score,   weight: '15%' },
    { name: 'Age',        val: health.age_score,     weight: '10%' },
  ] : [];

  function biColor(v) {
    if (v == null) return 'var(--text-dim)';
    return v >= 80 ? '#4ade80' : v >= 50 ? '#FFAE45' : '#FF8EE4';
  }

  const recentRows = (detail.recent_blocks || []).map(b => {
    // Gas utilization % — Monad blocks have ~200M gas limit; shows real per-block load
    const gasPct = b.gas_used ? Math.min(100, (b.gas_used / 200_000_000) * 100) : 0;
    const gasCol = gasPct >= 80 ? '#FF7849' : gasPct >= 50 ? '#FFAE45' : '#85E6FF';
    const t = typeof timeAgo === 'function' ? timeAgo(b.timestamp) : new Date(b.timestamp).toLocaleString();
    return `<tr>
      <td>${blockLink(b.number)}</td>
      <td>${fmtNum(b.tx_count)}</td>
      <td>${fmtNum(b.gas_used)}</td>
      <td style="color:${gasCol};font-variant-numeric:tabular-nums">${gasPct.toFixed(1)}%</td>
      <td style="color:var(--text-dim)">${t}</td>
    </tr>`;
  }).join('');

  const geoLine = detail.geo
    ? `<div class="val-addr-sub" style="margin-top:6px">📍 ${esc(detail.geo.city || '')}${detail.geo.country ? ', ' + esc(detail.geo.country) : ''}${detail.geo.provider ? ' · ' + esc(detail.geo.provider) : ''}</div>`
    : '';

  content.innerHTML = `
    <div class="val-hero">
      <div class="val-hero-top">
        <a href="/validators.html" class="val-back">← Validators</a>
      </div>
      <div class="val-name-big">${esc(displayName)}</div>
      <div class="val-addr-sub">
        <a href="${EXPLORER}/address/${addr}" target="_blank" style="color:#6B6580;text-decoration:underline;text-decoration-color:rgba(110,84,255,0.3)">${addr}</a>
      </div>
      ${geoLine}
      <div class="val-hero-row">
        <div class="val-hero-score">
          <span class="num" style="color:${scoreCol}">${totalScore != null ? totalScore.toFixed(1) : '—'}</span>
          <span class="lbl">Health Score${rank > 0 ? ' · Rank #' + rank + (totalVals ? ' / ' + totalVals : '') : ''}</span>
        </div>
        <div class="val-quick">
          <div class="q"><span class="v">${fmtNum(detail.stats.total_blocks)}</span><div class="k">Blocks</div></div>
          <div class="q"><span class="v" style="color:${avgBtCol}">${avgBtStr}</span><div class="k">Avg Block Time</div></div>
          <div class="q"><span class="v">${fmtNum(detail.stats.total_tx)}</span><div class="k">Total Txns</div></div>
          <div class="q"><span class="v">${lastSeen}</span><div class="k">Last Seen</div></div>
        </div>
      </div>
    </div>

    ${breakdownComponents.length ? `
    <section class="data-section">
      <div class="section-title">Health Breakdown</div>
      <div class="breakdown-grid">
        ${breakdownComponents.map(c => {
          const col = biColor(c.val);
          const w = c.val != null ? c.val : 0;
          return `<div class="breakdown-item">
            <div class="bi-name">${c.name}<span class="bi-weight">${c.weight}</span></div>
            <div class="bi-bar"><div class="bi-bar-fill" style="width:${w}%;background:${col};box-shadow:0 0 6px ${col}40"></div></div>
            <div class="bi-val" style="color:${col}">${c.val != null ? c.val.toFixed(1) : '—'}</div>
          </div>`;
        }).join('')}
      </div>
    </section>
    <div class="flow-sep"></div>
    ` : ''}

    <section class="data-section">
      <div class="section-title">Recent Blocks</div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>Block</th><th>Txns</th><th>Gas Used</th><th>Gas %</th><th>When</th></tr>
          </thead>
          <tbody>${recentRows || '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:24px">No recent blocks</td></tr>'}</tbody>
        </table>
      </div>
    </section>
  `;

  loading.style.display = 'none';
  empty.style.display = 'none';
  content.style.display = 'block';
}

document.addEventListener('DOMContentLoaded', loadValidator);
</script>
</body>
</html>

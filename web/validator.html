<script>
const MON = 1e18;

async function loadValidator() {
  const params = new URLSearchParams(location.search);
  const addr = (params.get('addr') || '').toLowerCase();
  const idParam = params.get('id');
  const loading = document.getElementById('val-loading');
  const content = document.getElementById('val-content');
  const empty = document.getElementById('val-empty');

  await loadNames();

  // ?id=N path — directly render from staking precompile
  if (idParam && /^\d+$/.test(idParam)) {
    await renderValidator(parseInt(idParam, 10), null, loading, content, empty);
    return;
  }

  // No params
  if (!addr) {
    loading.innerHTML = `
      <div style="max-width:420px;margin:0 auto;padding:40px 20px;text-align:center">
        <div style="font-size:15px;color:#DDD7FE;margin-bottom:8px">No validator selected</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:24px;line-height:1.6">
          This page expects a validator ID or address in the URL<br>
          (e.g. <code style="color:#a78bfa">?id=267</code> or <code style="color:#a78bfa">?addr=0x…</code>)
        </div>
        <a href="/validators.html" class="page-btn" style="display:inline-block;padding:10px 24px;text-decoration:none;min-width:180px">← Go to Validators</a>
      </div>`;
    return;
  }

  if (!/^0x[0-9a-f]{40}$/i.test(addr)) {
    loading.innerHTML = `
      <div style="max-width:420px;margin:0 auto;padding:40px 20px;text-align:center">
        <div style="font-size:15px;color:#FF8EE4;margin-bottom:8px">Malformed address</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:24px">Expected 0x + 40 hex characters.</div>
        <a href="/validators.html" class="page-btn" style="display:inline-block;padding:10px 24px;text-decoration:none;min-width:180px">← Go to Validators</a>
      </div>`;
    return;
  }

  if (addr === '0x0000000000000000000000000000000000000000') {
    loading.innerHTML = `
      <div style="max-width:520px;margin:0 auto;padding:40px 20px;text-align:center">
        <div style="font-size:15px;color:#FFAE45;margin-bottom:8px">⚠ Null proposer address</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:24px;line-height:1.7">
          Blocks attributed to <code style="color:#FFAE45">0x0000…0000</code> represent<br>
          proposer-recovery failures, not a real validator.<br>
          These rows are excluded from aggregates and rankings.
        </div>
        <a href="/validators.html" class="page-btn" style="display:inline-block;padding:10px 24px;text-decoration:none;min-width:180px">← Go to Validators</a>
      </div>`;
    return;
  }

  // ?addr= path — resolve to val_id. Two-step lookup:
  // (1) search by addr — works when addr IS the registered auth.
  // (2) fallback: on mainnet block.miner ≠ auth. If the names map knows
  //     this miner addr, search by its name instead — that finds the real
  //     auth/val_id entry in the directory.
  let match = null;
  const byAddr = await apiFetch('/validators/search?q=' + addr).catch(() => null);
  if (byAddr && byAddr.matches && byAddr.matches.length) {
    match = byAddr.matches[0];
  } else if (typeof valName === 'function') {
    const nm = valName(addr);
    if (nm) {
      const byName = await apiFetch('/validators/search?q=' + encodeURIComponent(nm)).catch(() => null);
      if (byName && byName.matches) {
        match = byName.matches.find(m => m.name === nm) || byName.matches[0];
      }
    }
  }

  if (match && match.val_id != null) {
    // Normalize URL to ?id=N (preserve network query). Unifies both entry
    // points on a single render path + keeps refresh/copy-paste stable.
    const net = params.get('network');
    const qs = '?id=' + match.val_id + (net ? '&network=' + encodeURIComponent(net) : '');
    history.replaceState(null, '', '/validator.html' + qs);
    await renderValidator(match.val_id, addr, loading, content, empty);
    return;
  }

  // Address truly not in the on-chain registry — fall back to block-only render
  await renderBlockOnly(addr, loading, content, empty);
}

// Unified renderer: given val_id, pull everything from the precompile AND
// enrich with block/health data keyed on the auth address.
async function renderValidator(valId, addrHint, loading, content, empty) {
  const v = await apiFetch('/validators/by-id/' + valId);
  if (!v || v.validator_id == null) {
    loading.innerHTML = `
      <div style="max-width:420px;margin:0 auto;padding:40px 20px;text-align:center">
        <div style="font-size:15px;color:#FFAE45;margin-bottom:8px">Validator #${esc(String(valId))} not found</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:24px">
          This validator is not registered on the current network (${esc(NETWORK)}).
        </div>
        <a href="/validators.html" class="page-btn" style="display:inline-block;padding:10px 24px;text-decoration:none;min-width:180px">← Go to Validators</a>
      </div>`;
    return;
  }

  const auth = (v.auth_address || '').toLowerCase();

  // Fetch addr-keyed enrichment in parallel: block stats, health breakdown,
  // rank + canonical name (search supports val_id as query and returns the
  // directory entry — we use this because on mainnet block.miner ≠ auth,
  // so the name map indexed on miner doesn't resolve for auth).
  const [detail, healthList, allValidators, searchRes] = await Promise.all([
    apiFetch('/validators/' + auth).catch(() => null),
    apiFetch('/health/scores?limit=500').catch(() => null),
    apiFetch('/validators/list?period=24h').catch(() => null),
    apiFetch('/validators/search?q=' + valId).catch(() => null),
  ]);
  const canonicalName = searchRes && searchRes.matches
    ? (searchRes.matches.find(m => m.val_id === valId) || searchRes.matches[0])?.name
    : null;

  // === Candidate addresses for health/list/blocks lookups ===
  // On testnet block.miner == auth, so auth alone works. On mainnet one
  // validator rotates through several ephemeral miner addresses and
  // /health/scores + /validators/list are indexed on MINER, not auth.
  // We collect auth plus every miner address the names map attributes
  // to the same canonical name, then match against any of them.
  const candidateAddrs = new Set([auth]);
  if (canonicalName && typeof _nameMap === 'object' && _nameMap) {
    for (const [addr, nm] of Object.entries(_nameMap)) {
      if (nm === canonicalName) candidateAddrs.add(addr.toLowerCase());
    }
  }
  const inCandidates = (a) => candidateAddrs.has((a || '').toLowerCase());

  const geo = detail && detail.geo;
  const health = (healthList || []).find(h => inCandidates(h.validator_id)) || null;
  const allList = allValidators || [];
  // Pick the most recently active list entry among candidate miners
  // (mainnet: multiple rotate; we want the one that's still producing).
  const listEntries = allList.filter(x => inCandidates(x.address));
  listEntries.sort((a, b) => new Date(b.last_seen || 0) - new Date(a.last_seen || 0));
  const listEntry = listEntries[0] || null;
  // Sum blocks + txns across every candidate miner for truthful totals,
  // but take avg_block_time / last_seen from the most-recent entry only.
  const blocksData = listEntry
    ? {
        total_blocks: listEntries.reduce((s, e) => s + (e.blocks_proposed || 0), 0),
        avg_block_time_ms: listEntry.avg_block_time_ms,
        total_tx: listEntries.reduce((s, e) => s + (e.total_tx || 0), 0),
        first_seen: listEntries[listEntries.length - 1]?.first_seen,
        last_seen: listEntry.last_seen,
      }
    : (detail && detail.stats ? detail.stats : null);
  const recentBlocks = detail && detail.recent_blocks ? detail.recent_blocks : [];
  const rank = listEntry ? allList.findIndex(x => x === listEntry) + 1 : 0;
  const totalVals = allList.length;
  const totalScore = health ? health.total_score : null;
  const scoreCol = totalScore == null ? 'var(--text-dim)'
    : totalScore >= 80 ? '#4ade80'
    : totalScore >= 50 ? '#FFAE45'
    : '#FF8EE4';
  // Uptime is the 40%-weighted component of Health Score. Surface it as
  // its own big number — operators (and VDP reviewers) want uptime to
  // be the first thing visible, not buried inside the composite.
  const uptimePct = health && health.uptime_score != null ? health.uptime_score : null;
  // VDP 4-week uptime target is 98% — green only when ≥ target.
  const uptimeCol = uptimePct == null ? 'var(--text-dim)'
    : uptimePct >= 98 ? '#4ade80'
    : uptimePct >= 50 ? '#FFAE45'
    : '#FF8EE4';

  // Prefer canonical directory name; fall back to names-map lookup by
  // auth addr (works on testnet where miner==auth); last resort: ID only.
  const name = canonicalName || (typeof valName === 'function' && valName(auth)) || null;
  const displayName = name || `Validator #${v.validator_id}`;
  const execStake = v.execution_stake / MON;
  const consStake = v.consensus_stake / MON;
  const snapStake = v.snapshot_stake / MON;
  const poolUnclaimed = v.unclaimed_rewards / MON;
  const opClaim = v.operator_claimable_rewards != null ? v.operator_claimable_rewards / MON : null;
  // Commission is a wei-scale ratio on the Monad staking contract:
  // 1e18 = 100%. NOT basis-points-times-100 (old formula /100 produced
  // "400000000000000.00 %" for CMS Holdings with a real 4% commission).
  const comm = (Number(v.execution_commission) / 1e16).toFixed(2);
  const isActive = v.consensus_stake > 0;

  const avgBt = blocksData ? blocksData.avg_block_time_ms : null;
  const avgBtStr = avgBt == null ? '—' : avgBt + ' ms';
  const avgBtCol = avgBt == null ? 'inherit'
    : (avgBt > 450 || (avgBt < 300 && avgBt > 0)) ? '#FF8EE4' : 'inherit';
  const lastSeen = blocksData && blocksData.last_seen
    ? (typeof timeAgo === 'function' ? timeAgo(blocksData.last_seen) : new Date(blocksData.last_seen).toLocaleString())
    : '—';

  const breakdownComponents = health ? [
    { name: 'Uptime',     val: health.uptime_score,  weight: '40%' },
    { name: 'Block Time', val: health.miss_score,    weight: '20%' },
    { name: 'Upgrade',    val: health.upgrade_score, weight: '15%' },
    { name: 'Stake',      val: health.stake_score,   weight: '15%' },
    { name: 'Age',        val: health.age_score,     weight: '10%' },
  ] : [];
  const biColor = (val) => val == null ? 'var(--text-dim)'
    : val >= 80 ? '#4ade80' : val >= 50 ? '#FFAE45' : '#FF8EE4';

  const recentRows = recentBlocks.map(b => {
    const gasPct = b.gas_used ? Math.min(100, (b.gas_used / 200_000_000) * 100) : 0;
    const gasCol = gasPct >= 80 ? '#FF7849' : gasPct >= 50 ? '#FFAE45' : '#85E6FF';
    const t = typeof timeAgo === 'function' ? timeAgo(b.timestamp) : new Date(b.timestamp).toLocaleString();
    return `<tr>
      <td>${blockLink(b.number)}</td>
      <td>${fmtNum(b.tx_count)}</td>
      <td>${fmtNum(b.gas_used)}</td>
      <td style="color:${gasCol};font-variant-numeric:tabular-nums">${gasPct.toFixed(1)}%</td>
      <td style="color:var(--text-dim)">${t}</td>
    </tr>`;
  }).join('');

  const geoLine = geo
    ? `<div class="val-addr-sub" style="margin-top:6px">📍 ${esc(geo.city || '')}${geo.country ? ', ' + esc(geo.country) : ''}${geo.provider ? ' · ' + esc(geo.provider) : ''}</div>`
    : '';

  const statusBadge = isActive
    ? '<span class="val-hero-badge" style="background:rgba(74,222,128,0.12);color:#4ade80">Active</span>'
    : '<span class="val-hero-badge" style="background:rgba(255,174,69,0.12);color:#FFAE45">Pending</span>';

  // For PENDING validators (consensus_stake=0 — they can't propose blocks
  // in the current epoch) any blocks found under their miner addresses
  // came from a previous active period. Showing them as "Blocks / Last
  // Seen" at the top of the page contradicts the Signing Activity
  // section below (which correctly reports 0 blocks in the last 24h).
  // Hide the live-activity cells for PENDING; show the past-role blocks
  // as a note instead if there are any.
  const blocksMetric = !isActive
    ? (blocksData && blocksData.total_blocks
        ? `<div class="q" title="Blocks attributed to this validator during a previous active period. Not counted toward current uptime."><span class="v" style="color:var(--text-dim);font-size:14px">${fmtNum(blocksData.total_blocks)} (past role)</span><div class="k">Historical Blocks</div></div>`
        : `<div class="q"><span class="v" style="color:var(--text-dim);font-size:14px">pending</span><div class="k">No active blocks</div></div>`)
    : blocksData
      ? `<div class="q"><span class="v">${fmtNum(blocksData.total_blocks)}</span><div class="k">Blocks</div></div>
         <div class="q"><span class="v" style="color:${avgBtCol}">${avgBtStr}</span><div class="k">Avg Block Time</div></div>
         <div class="q"><span class="v">${fmtNum(blocksData.total_tx)}</span><div class="k">Total Txns</div></div>
         <div class="q"><span class="v">${lastSeen}</span><div class="k">Last Seen</div></div>`
      : `<div class="q" title="block.miner is ephemeral per-block on this network and doesn't match auth — no block-level stats collected for this validator.">
           <span class="v" style="color:var(--text-dim);font-size:14px">—</span>
           <div class="k">Block Stats</div>
         </div>`;

  content.innerHTML = `
    <div class="val-hero">
      <div class="val-hero-top">
        <a href="/validators.html" class="val-back">← Validators</a>
      </div>
      <div class="val-name-big" title="${name ? 'Name from monad-developers/validator-info (mapped by SECP pubkey)' : 'No name registered in upstream validator-info repo — using validator ID'}">${esc(displayName)}${statusBadge}</div>
      <div class="val-addr-sub">
        <span style="color:#6B6580">ID</span>
        <span style="color:#DDD7FE;margin-left:6px">#${v.validator_id}</span>
        <span style="margin:0 10px;color:var(--text-dim)">·</span>
        <span style="color:#6B6580">Auth</span>
        <a href="${EXPLORER}/address/${auth}" target="_blank" style="color:#a78bfa;text-decoration:none;margin-left:6px">${auth}</a>
      </div>
      ${geoLine}
      <div class="val-hero-row">
        <div class="val-hero-score">
          <span class="num" style="color:${scoreCol}">${totalScore != null ? totalScore.toFixed(1) : '—'}</span>
          <span class="lbl">Health Score${rank > 0 ? ' · Rank #' + rank + (totalVals ? ' / ' + totalVals : '') : ''}</span>
        </div>
        <div class="val-hero-score" title="Actual blocks produced vs expected (stake-weighted share × time-since-first-active). 100% = producing at full rate.">
          <span class="num" style="color:${uptimeCol}">${uptimePct != null ? uptimePct.toFixed(1) + '%' : '—'}</span>
          <span class="lbl">Uptime (7d)</span>
        </div>
        <div class="val-quick">
          ${blocksMetric}
        </div>
      </div>
      <div class="val-hero-row" style="margin-top:18px">
        <div class="val-quick">
          <div class="q"><span class="v">${fmtNum(Math.round(execStake))} MON</span><div class="k">Execution Stake</div></div>
          <div class="q"><span class="v">${fmtNum(Math.round(consStake))} MON</span><div class="k">Consensus Stake</div></div>
          <div class="q"><span class="v">${fmtNum(Math.round(snapStake))} MON</span><div class="k">Snapshot Stake</div></div>
          <div class="q"><span class="v">${comm} %</span><div class="k">Commission</div></div>
          <div class="q"><span class="v" id="vdp-uptime-val" style="color:var(--text-dim)">…</span><div class="k" title="Time since first Reward event / 28 days (VDP 4-week target)">VDP Uptime</div></div>
        </div>
      </div>
    </div>

    <section class="data-section" id="vdp-compliance-section" style="display:none">
      <div class="section-title">VDP Compliance
        <span style="color:var(--text-dim);font-weight:400;font-size:11px;margin-left:10px">uptime = blocks produced / blocks assigned &middot; target &ge;98% weekly</span>
      </div>
      <div class="vdp-grid" id="vdp-grid"></div>
      <div style="color:var(--text-dim);font-size:11px;margin-top:12px;line-height:1.6">
        <b>Formula:</b> VDP uptime = <code style="color:var(--purple-light)">blocks_produced / blocks_assigned</code>, as understood by the validator community. MonadPulse approximates <em>blocks_assigned</em> via stake-weighted expectation (<code>validator_stake / total_stake &times; network_blocks</code>) &mdash; correct in long-window averages.
        <br>During Foundation <strong>stake rotation</strong> (validator out of consensus set), <code>blocks_assigned = 0</code> &rarr; ratio is undefined &rarr; operator is <em>excluded</em> from the metric for that period, not penalised.
        <br>Source: <a href="https://docs.monad.xyz/node-ops/validator-delegation-program" target="_blank" rel="noopener" style="color:var(--purple-light)">docs.monad.xyz &ndash; Validator Delegation Program</a>.
      </div>
    </section>

    <section class="data-section" id="signing-uptime-section" style="display:none">
      <div class="section-title">Signing Activity
        <span style="color:var(--text-dim);font-weight:400;font-size:11px;margin-left:10px">proposing rate vs validator's own 24h baseline</span>
      </div>
      <div class="breakdown-grid" id="signing-uptime-grid"></div>
      <div id="signing-uptime-note" style="color:var(--text-dim);font-size:11px;margin-top:12px;line-height:1.6"></div>
    </section>
    <div class="flow-sep"></div>

    ${breakdownComponents.length ? `
    <section class="data-section">
      <div class="section-title">Health Breakdown</div>
      <div class="breakdown-grid">
        ${breakdownComponents.map(c => {
          const col = biColor(c.val);
          const w = c.val != null ? c.val : 0;
          return `<div class="breakdown-item">
            <div class="bi-name">${c.name}<span class="bi-weight">${c.weight}</span></div>
            <div class="bi-bar"><div class="bi-bar-fill" style="width:${w}%;background:${col};box-shadow:0 0 6px ${col}40"></div></div>
            <div class="bi-val" style="color:${col}">${c.val != null ? c.val.toFixed(1) : '—'}</div>
          </div>`;
        }).join('')}
      </div>
    </section>
    <div class="flow-sep"></div>
    ` : ''}

    <section class="data-section">
      <div class="section-title">Rewards</div>
      <div class="rewards-split">
        <div class="rewards-card">
          <div class="rc-k">Pool Unclaimed (all delegators)</div>
          <div class="rc-v" style="color:var(--text-dim)">${fmtNum(Math.round(poolUnclaimed))} MON</div>
          <div class="rc-note">
            Total unclaimed across self-stake + every external delegator of this validator.
            Each delegator can only claim their own slice — the staking contract enforces
            <code>sender == delegator</code>.
          </div>
        </div>
        <div class="rewards-card">
          <div class="rc-k">Operator Claimable (auth address)</div>
          <div class="rc-v" style="color:var(--cyan,#85E6FF)">${opClaim != null ? opClaim.toFixed(2) + ' MON' : '—'}</div>
          <div class="rc-note">
            The validator auth EOA's own share — proportional to self-stake, plus
            ${comm}% commission on other delegators' gross rewards.
          </div>
        </div>
      </div>
    </section>

    <div class="flow-sep"></div>

    <section class="data-section">
      <div class="section-title">Consensus Keys</div>
      <div class="breakdown-grid">
        <div class="breakdown-item">
          <div class="bi-name">SECP Pubkey</div>
          <div style="font-family:var(--mono);font-size:10px;color:#DDD7FE;word-break:break-all;line-height:1.5">${esc(v.secp_pubkey)}</div>
        </div>
        <div class="breakdown-item">
          <div class="bi-name">BLS Pubkey</div>
          <div style="font-family:var(--mono);font-size:10px;color:#DDD7FE;word-break:break-all;line-height:1.5">${esc(v.bls_pubkey)}</div>
        </div>
      </div>
    </section>

    ${blocksData ? `
    <div class="flow-sep"></div>
    <section class="data-section">
      <div class="section-title">Recent Blocks</div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>Block</th><th>Txns</th><th>Gas Used</th><th>Gas %</th><th>When</th></tr>
          </thead>
          <tbody>${recentRows || '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:24px">No recent blocks</td></tr>'}</tbody>
        </table>
      </div>
    </section>
    ` : ''}
  `;

  loading.style.display = 'none';
  empty.style.display = 'none';
  content.style.display = 'block';

  // Async VDP uptime fetch (first-active scan can take a few seconds cold)
  apiFetch('/validators/by-id/' + valId + '/first-active').then(fa => {
    const el = document.getElementById('vdp-uptime-val');
    if (!el) return;
    if (!fa || !fa.first_active_timestamp) { el.textContent = '—'; return; }
    const VDP_TARGET_MS = 28 * 24 * 3600 * 1000;
    const age = Date.now() - fa.first_active_timestamp * 1000;
    const pct = Math.min(age / VDP_TARGET_MS * 100, 100);
    el.textContent = pct.toFixed(1) + '%';
    el.style.color = pct >= 100 ? '#4ade80' : pct >= 50 ? '#FFAE45' : '#FF8EE4';
  }).catch(() => { const el = document.getElementById('vdp-uptime-val'); if (el) el.textContent = '—'; });

  // Async signing-uptime fetch (1h / 8h / 24h / 7d + VDP state). Cold RPC
  // discovery may take 1-2s, so this doesn't block the initial render.
  // Also fetch upgrade status for VDP compliance (client version check).
  Promise.all([
    apiFetch('/validators/by-id/' + valId + '/signing-uptime'),
    apiFetch('/upgrades/status'),
  ]).then(([s, up]) => {
    const section = document.getElementById('signing-uptime-section');
    const grid = document.getElementById('signing-uptime-grid');
    const note = document.getElementById('signing-uptime-note');
    if (!section || !grid) return;
    if (!s || !s.windows) {
      note.textContent = 'Signing uptime data not available on this network yet.';
      section.style.display = 'block';
      return;
    }
    const color = (pct) => pct == null ? 'var(--text-dim)'
      : pct >= 90 ? '#4ade80' : pct >= 50 ? '#FFAE45' : '#FF8EE4';
    const cells = [['1h', '1 hour'], ['8h', '8 hours'], ['24h', '24 hours']].map(([k, label]) => {
      const w = s.windows[k];
      const pct = w && w.pct;
      const col = color(pct);
      const shownPct = pct == null ? '—' : pct.toFixed(1) + '%';
      const sub = w
        ? `${fmtNum(w.actual)} / ${fmtNum(Math.round(w.expected))} blocks`
        : '—';
      return `<div class="breakdown-item">
        <div class="bi-name">${label}</div>
        <div class="bi-bar"><div class="bi-bar-fill" style="width:${pct == null ? 0 : pct}%;background:${col};box-shadow:0 0 6px ${col}40"></div></div>
        <div class="bi-val" style="color:${col}">${shownPct}</div>
        <div style="color:var(--text-dim);font-size:10px;margin-top:4px;font-family:var(--mono)">${sub}</div>
      </div>`;
    }).join('');
    grid.innerHTML = cells;
    const baseShare = s.share_24h != null ? s.share_24h.toFixed(3) + '%' : '—';
    let noteText = `Validator 24h share of network: ${baseShare} (${fmtNum(s.active_validators_24h)} active validators in window). `;
    if (s.share_24h === 0) {
      noteText += 'No blocks attributed to this validator in the last 24h — either the node is offline, or the collector hasn\'t resolved its block.miner addresses yet.';
    } else {
      noteText += 'A sustained drop in 1h pct signals an active outage; 8h / 24h are more stable.';
    }
    note.textContent = noteText;
    section.style.display = 'block';

    // ─── VDP Compliance section ─────────────────────────────────────────
    // Show only if validator is enrolled in VDP (has Foundation delegation).
    const vdpState = s.vdp || {};
    const vdpSection = document.getElementById('vdp-compliance-section');
    const vdpGrid = document.getElementById('vdp-grid');
    if (!vdpSection || !vdpGrid || !vdpState.enrolled) return;

    // Weekly uptime: 7d window pct. ≥98% target.
    const w7 = s.windows['7d'];
    const weeklyPct = w7 && w7.pct != null ? w7.pct : null;
    const weeklyOk = weeklyPct != null && weeklyPct >= 98;
    const weeklyCol = weeklyPct == null ? 'var(--text-dim)'
      : weeklyOk ? '#4ade80' : weeklyPct >= 90 ? '#FFAE45' : '#FF8EE4';
    const weeklyIcon = weeklyOk ? '✅' : weeklyPct == null ? '' : '⚠';
    const weeklySub = w7
      ? `${fmtNum(w7.actual)} / ${fmtNum(Math.round(w7.expected))} blocks over 7d`
      : '—';

    // Client version: from /upgrades/status. Green if up_to_date OR within 48h.
    const curVer = up && up.current_version || '—';
    const latest = up && up.latest_release && up.latest_release.tag || '—';
    const hrsSince = up && up.hours_since_release;
    const upToDate = up && up.up_to_date;
    const within48h = upToDate || (hrsSince != null && hrsSince < 48);
    const verCol = within48h ? '#4ade80' : hrsSince != null && hrsSince < 72 ? '#FFAE45' : '#FF8EE4';
    const verIcon = within48h ? '✅' : '⚠';
    const verSub = upToDate
      ? `Running latest ${latest}`
      : hrsSince != null
        ? `${latest} released ${Math.round(hrsSince)}h ago — upgrade within 48h`
        : `Running ${curVer}`;

    // Rotation / enrollment status.
    const rotating = !!vdpState.rotation_active;
    const days = vdpState.days_enrolled;
    const statusText = rotating ? 'In rotation cycle 🔄' : 'Active participant';
    const statusCol = rotating ? '#85E6FF' : '#4ade80';
    const statusSub = days != null
      ? `${days} day${days === 1 ? '' : 's'} since Foundation delegation`
      : '—';

    // If validator is in rotation right now, the ratio is undefined (no
    // assigned slots). Show "excluded" with historic pre-rotation rate.
    const rotatingVdp = !!vdpState.rotation_active;
    const vdpUptimeDisplay = rotatingVdp && weeklyPct != null
      ? `${weeklyPct.toFixed(1)}% <span style="color:var(--text-dim);font-size:11px;font-weight:400">pre-rotation</span>`
      : weeklyPct != null
        ? `${weeklyPct.toFixed(1)}% ${weeklyIcon}`
        : '— ';

    vdpGrid.innerHTML = `
      <div class="vdp-item">
        <div class="vdp-label">Uptime: produced / assigned <span style="color:var(--text-dim);font-weight:400">(target ≥98% weekly)</span></div>
        <div class="vdp-value" style="color:${rotatingVdp ? '#85E6FF' : weeklyCol}">${vdpUptimeDisplay}</div>
        <div class="vdp-sub">${weeklySub}${rotatingVdp ? ' · currently in rotation, 0 slots assigned' : ''}</div>
      </div>
      <div class="vdp-item">
        <div class="vdp-label">Client version <span style="color:var(--text-dim);font-weight:400">(upgrade within 48h)</span></div>
        <div class="vdp-value" style="color:${verCol}">${esc(curVer)} ${verIcon}</div>
        <div class="vdp-sub">${esc(verSub)}</div>
      </div>
      <div class="vdp-item">
        <div class="vdp-label">VDP status</div>
        <div class="vdp-value" style="color:${statusCol}">${statusText}</div>
        <div class="vdp-sub">${statusSub}</div>
      </div>
    `;
    vdpSection.style.display = 'block';
  }).catch(() => {
    const section = document.getElementById('signing-uptime-section');
    const note = document.getElementById('signing-uptime-note');
    if (section && note) {
      note.textContent = 'Signing uptime unavailable — API error.';
      section.style.display = 'block';
    }
  });
}

// Fallback when ?addr= doesn't resolve to a registered validator — still show
// whatever block-level data the collector has for the address.
async function renderBlockOnly(addr, loading, content, empty) {
  const [detail, healthList, allValidators] = await Promise.all([
    apiFetch('/validators/' + addr),
    apiFetch('/health/scores?limit=500').catch(() => null),
    apiFetch('/validators/list?period=24h').catch(() => null),
  ]);

  if (!detail || !detail.stats) {
    loading.style.display = 'none';
    document.getElementById('val-empty-addr').textContent = addr;
    empty.style.display = 'block';
    return;
  }

  const health = (healthList || []).find(h => h.validator_id === addr) || null;
  const rank = (allValidators || []).findIndex(v => v.address === addr) + 1;
  const totalVals = (allValidators || []).length;
  const name = (typeof valName === 'function' && valName(addr)) || null;
  const displayName = name || shortAddr(addr);
  const totalScore = health ? health.total_score : null;
  const scoreCol = totalScore == null ? 'var(--text-dim)'
    : totalScore >= 80 ? '#4ade80'
    : totalScore >= 50 ? '#FFAE45'
    : '#FF8EE4';
  // Uptime is the 40%-weighted component of Health Score. Surface it as
  // its own big number — operators (and VDP reviewers) want uptime to
  // be the first thing visible, not buried inside the composite.
  const uptimePct = health && health.uptime_score != null ? health.uptime_score : null;
  // VDP 4-week uptime target is 98% — green only when ≥ target.
  const uptimeCol = uptimePct == null ? 'var(--text-dim)'
    : uptimePct >= 98 ? '#4ade80'
    : uptimePct >= 50 ? '#FFAE45'
    : '#FF8EE4';

  const avgBt = detail.stats.avg_block_time_ms;
  const avgBtStr = avgBt == null ? '—' : avgBt + ' ms';
  const avgBtCol = avgBt == null ? 'inherit'
    : (avgBt > 450 || (avgBt < 300 && avgBt > 0)) ? '#FF8EE4' : 'inherit';
  const lastSeen = detail.stats.last_seen
    ? (typeof timeAgo === 'function' ? timeAgo(detail.stats.last_seen) : new Date(detail.stats.last_seen).toLocaleString())
    : '—';

  const breakdownComponents = health ? [
    { name: 'Uptime',     val: health.uptime_score,  weight: '40%' },
    { name: 'Block Time', val: health.miss_score,    weight: '20%' },
    { name: 'Upgrade',    val: health.upgrade_score, weight: '15%' },
    { name: 'Stake',      val: health.stake_score,   weight: '15%' },
    { name: 'Age',        val: health.age_score,     weight: '10%' },
  ] : [];
  const biColor = (v) => v == null ? 'var(--text-dim)'
    : v >= 80 ? '#4ade80' : v >= 50 ? '#FFAE45' : '#FF8EE4';

  const recentRows = (detail.recent_blocks || []).map(b => {
    const gasPct = b.gas_used ? Math.min(100, (b.gas_used / 200_000_000) * 100) : 0;
    const gasCol = gasPct >= 80 ? '#FF7849' : gasPct >= 50 ? '#FFAE45' : '#85E6FF';
    const t = typeof timeAgo === 'function' ? timeAgo(b.timestamp) : new Date(b.timestamp).toLocaleString();
    return `<tr>
      <td>${blockLink(b.number)}</td>
      <td>${fmtNum(b.tx_count)}</td>
      <td>${fmtNum(b.gas_used)}</td>
      <td style="color:${gasCol};font-variant-numeric:tabular-nums">${gasPct.toFixed(1)}%</td>
      <td style="color:var(--text-dim)">${t}</td>
    </tr>`;
  }).join('');

  const geoLine = detail.geo
    ? `<div class="val-addr-sub" style="margin-top:6px">📍 ${esc(detail.geo.city || '')}${detail.geo.country ? ', ' + esc(detail.geo.country) : ''}${detail.geo.provider ? ' · ' + esc(detail.geo.provider) : ''}</div>`
    : '';

  content.innerHTML = `
    <div class="val-hero">
      <div class="val-hero-top">
        <a href="/validators.html" class="val-back">← Validators</a>
      </div>
      <div class="val-name-big">${esc(displayName)}</div>
      <div class="val-addr-sub">
        <a href="${EXPLORER}/address/${addr}" target="_blank" style="color:#6B6580;text-decoration:underline;text-decoration-color:rgba(110,84,255,0.3)">${addr}</a>
      </div>
      ${geoLine}
      <div style="margin-top:14px;padding:10px 14px;background:rgba(255,174,69,0.08);border:1px solid rgba(255,174,69,0.2);border-radius:8px;font-size:11px;color:#FFAE45;max-width:720px">
        ℹ This address produced blocks but isn't registered in the on-chain validator set —
        on-chain stake/commission/rewards data is unavailable.
      </div>
      <div class="val-hero-row">
        <div class="val-hero-score">
          <span class="num" style="color:${scoreCol}">${totalScore != null ? totalScore.toFixed(1) : '—'}</span>
          <span class="lbl">Health Score${rank > 0 ? ' · Rank #' + rank + (totalVals ? ' / ' + totalVals : '') : ''}</span>
        </div>
        <div class="val-hero-score" title="Actual blocks produced vs expected (stake-weighted share × time-since-first-active). 100% = producing at full rate.">
          <span class="num" style="color:${uptimeCol}">${uptimePct != null ? uptimePct.toFixed(1) + '%' : '—'}</span>
          <span class="lbl">Uptime (7d)</span>
        </div>
        <div class="val-quick">
          <div class="q"><span class="v">${fmtNum(detail.stats.total_blocks)}</span><div class="k">Blocks</div></div>
          <div class="q"><span class="v" style="color:${avgBtCol}">${avgBtStr}</span><div class="k">Avg Block Time</div></div>
          <div class="q"><span class="v">${fmtNum(detail.stats.total_tx)}</span><div class="k">Total Txns</div></div>
          <div class="q"><span class="v">${lastSeen}</span><div class="k">Last Seen</div></div>
        </div>
      </div>
    </div>

    ${breakdownComponents.length ? `
    <section class="data-section">
      <div class="section-title">Health Breakdown</div>
      <div class="breakdown-grid">
        ${breakdownComponents.map(c => {
          const col = biColor(c.val);
          const w = c.val != null ? c.val : 0;
          return `<div class="breakdown-item">
            <div class="bi-name">${c.name}<span class="bi-weight">${c.weight}</span></div>
            <div class="bi-bar"><div class="bi-bar-fill" style="width:${w}%;background:${col};box-shadow:0 0 6px ${col}40"></div></div>
            <div class="bi-val" style="color:${col}">${c.val != null ? c.val.toFixed(1) : '—'}</div>
          </div>`;
        }).join('')}
      </div>
    </section>
    <div class="flow-sep"></div>
    ` : ''}

    <section class="data-section">
      <div class="section-title">Recent Blocks</div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>Block</th><th>Txns</th><th>Gas Used</th><th>Gas %</th><th>When</th></tr>
          </thead>
          <tbody>${recentRows || '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:24px">No recent blocks</td></tr>'}</tbody>
        </table>
      </div>
    </section>
  `;

  loading.style.display = 'none';
  empty.style.display = 'none';
  content.style.display = 'block';
}

document.addEventListener('DOMContentLoaded', loadValidator);
</script>
</body>

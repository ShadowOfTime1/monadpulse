<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="bg" cx="0.25" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#1a0d3a"/>
      <stop offset="40%" stop-color="#0a0514"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6E54FF"/>
      <stop offset="60%" stop-color="#B79CFF"/>
      <stop offset="100%" stop-color="#85E6FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="rgba(110,84,255,0.05)" stroke-width="1">
    <path d="M0 210 H1200 M0 420 H1200 M300 0 V630 M600 0 V630 M900 0 V630"/>
  </g>

  <!-- pulse rings -->
  <g transform="translate(995, 165)" opacity="0.35">
    <circle r="115" fill="none" stroke="#6E54FF" stroke-width="1.2"/>
    <circle r="75" fill="none" stroke="#85E6FF" stroke-width="1"/>
    <circle r="40" fill="none" stroke="#B79CFF" stroke-width="0.8"/>
    <circle r="12" fill="#85E6FF" filter="url(#glow)"/>
  </g>

  <!-- heartbeat line under tagline -->
  <polyline fill="none" stroke="#6E54FF" stroke-width="2" opacity="0.55"
            points="80,440 280,440 300,440 308,418 316,462 324,424 332,450 340,440 620,440 640,440 648,418 656,462 664,424 672,450 680,440 1120,440"/>

  <!-- title -->
  <text x="80" y="250" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="104" font-weight="700" fill="#EEEDF5" letter-spacing="-3">Monad<tspan fill="url(#brand)">Pulse</tspan></text>

  <!-- tagline -->
  <text x="80" y="330" font-family="'Inter', sans-serif" font-size="32" font-weight="400" fill="#9994AE">Monad Network Observatory</text>

  <!-- feature strip -->
  <g font-family="'JetBrains Mono', 'Roboto Mono', monospace" font-size="16" fill="#6B6580" letter-spacing="2">
    <text x="80" y="510">LIVE BLOCKS · VALIDATORS · STAKE · GAS · ALERTS</text>
  </g>

  <!-- url + network badges -->
  <g transform="translate(80, 560)">
    <text font-family="'JetBrains Mono', monospace" font-size="22" fill="#DDD7FE" letter-spacing="1">monadpulse.xyz</text>
    <g transform="translate(340, -18)">
      <rect width="90" height="28" rx="14" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1"/>
      <text x="45" y="19" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#14b8a6" letter-spacing="2">TESTNET</text>
    </g>
    <g transform="translate(445, -18)">
      <rect width="90" height="28" rx="14" fill="rgba(110,84,255,0.15)" stroke="#6E54FF" stroke-width="1"/>
      <text x="45" y="19" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6E54FF" letter-spacing="2">MAINNET</text>
    </g>
  </g>
</svg>
